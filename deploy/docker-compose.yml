services:

  # ── Base de datos PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: canchas_db
      POSTGRES_USER: ${BD_USER}
      POSTGRES_PASSWORD: ${BD_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BD_USER} -d canchas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend Spring Boot ──────────────────────────────────────────────────────
  backend:
    build: ../api.canchas
    depends_on:
      db:
        condition: service_healthy
    environment:
      BD_URL: jdbc:postgresql://db:5432/canchas_db
      BD_USER: ${BD_USER}
      BD_PASSWORD: ${BD_PASSWORD}
      PRIVATE_KEY: ${PRIVATE_KEY}
      USER_GENERATOR: ${USER_GENERATOR}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-dev-secret}
      MP_WEBHOOK_URL: ${MP_WEBHOOK_URL:-}
      MP_OAUTH_CLIENT_ID: ${MP_OAUTH_CLIENT_ID:-}
      MP_OAUTH_CLIENT_SECRET: ${MP_OAUTH_CLIENT_SECRET:-}
      MP_OAUTH_REDIRECT_URI: ${MP_OAUTH_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      # En local creamos las tablas automáticamente (en prod usamos validate)
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    restart: unless-stopped

  # ── Frontend React ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost}
        REACT_APP_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    restart: unless-stopped

  # ── Nginx (reverse proxy) ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  logs_data:
