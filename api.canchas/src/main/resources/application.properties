spring.application.name=api.canchas
server.port=8080

# ============ CORS ============
cors.allowed-origins=http://localhost:3000

# ============ Base de Datos (PostgreSQL) ============
spring.datasource.url=${BD_URL}
spring.datasource.username=${BD_USER}
spring.datasource.password=${BD_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============ JPA / Hibernate ============
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============ JWT ============
security.jwt.private.key=${PRIVATE_KEY}
security.jwt.user.generator=${USER_GENERATOR}

# ============ Pago por Transferencia ============
pago.alias=cancha.gnc.mp
pago.limite.minutos=15

# ============ Google OAuth ============
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}

# ============ Subida de imagenes ============
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
uploads.path=uploads/canchas

# ============ Mercado Pago ============
# Access token por env var (fallback). El token real se guarda por complejo en la tabla config_pago.
mercadopago.access.token=${MP_ACCESS_TOKEN:}
mercadopago.webhook.secret=${MP_WEBHOOK_SECRET:dev-secret}
# En dev/test desactivar validacion de firma (activar en produccion)
mercadopago.webhook.validate-signature=false
mercadopago.frontend.url=${FRONTEND_URL:http://localhost:3000}
mercadopago.webhook.url=${MP_WEBHOOK_URL:http://localhost}

# ============ Mercado Pago OAuth (credenciales de TU APP como integrador) ============
# client_id  = N° de aplicación en MP Developers
# client_secret = Access Token de la app (de TU cuenta, no del cliente)
# redirect_uri  = debe coincidir exactamente con la configurada en la app de MP
mercadopago.oauth.client-id=${MP_OAUTH_CLIENT_ID}
mercadopago.oauth.client-secret=${MP_OAUTH_CLIENT_SECRET}
mercadopago.oauth.redirect-uri=${MP_OAUTH_REDIRECT_URI:http://localhost/api/oauth/mercadopago/callback}

# ============ Rate Limiting (requests por minuto por IP) ============
rate.limit.auth=5
rate.limit.write=25
rate.limit.read=50
